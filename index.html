 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gestão da Automação • v51</title>
    <meta name="theme-color" content="#ff6a00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --bg: #0a0a0c;
            --card: #13131a;
            --border: #2a2a35;
            --orange: #ff6a00;
            --green: #00e676;
            --yellow: #ffd600;
            --red: #ff1744;
            --blue: #00b0ff;
            --white: #e8e8f0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Barlow Condensed', system-ui, sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            font-size: 28px;
            overflow-x: hidden;
        }
        header {
            background: #0d0d10;
            padding: 12px 16px;
            border-bottom: 3px solid var(--orange);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .title {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--orange);
        }
        .subtitle {
            font-size: 22px;
            color: #888;
        }
        .main {
            padding: 16px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .kpi-big {
            font-size: 68px;
            font-weight: 700;
            color: var(--orange);
        }
        .btn {
            background: var(--orange);
            color: #000;
            border: none;
            padding: 14px 24px;
            font-size: 26px;
            font-weight: 700;
            border-radius: 8px;
            width: 100%;
            margin-top: 12px;
        }
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0d0d10;
            border-top: 2px solid var(--border);
            display: flex;
            padding: 8px 0;
            z-index: 200;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            font-size: 22px;
            padding: 8px;
            color: #888;
        }
        .nav-item.active {
            color: var(--orange);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div>
            <div class="title">GESTÃO AUTOMAÇÃO</div>
            <div class="subtitle">MINA DO ANDRADE — v51</div>
        </div>
        <div style="text-align:right; font-size:24px;">
            <div id="clock" style="color:#ff9500; font-family:monospace;"></div>
            <div style="font-size:18px; color:#666;">Sábado, 18 Abr 2026</div>
        </div>
    </header>

    <div class="main">

        <!-- KPI PRINCIPAL -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div style="font-size:24px; color:#888;">IAMO • Abril 2026</div>
                    <div class="kpi-big" id="iamo-main">94.8%</div>
                </div>
                <div style="font-size:80px; color:var(--green);">📈</div>
            </div>
            <div style="height:8px; background:#222; border-radius:4px; margin:12px 0;">
                <div style="width:94.8%; height:100%; background:var(--green); border-radius:4px;"></div>
            </div>
            <div style="display:flex; gap:12px; font-size:22px;">
                <div>Auto: <span style="color:var(--green);">96%</span></div>
                <div>Inst: <span style="color:var(--blue);">93%</span></div>
                <div>Redes: <span style="color:var(--green);">95%</span></div>
            </div>
        </div>

        <!-- CARDS RÁPIDOS -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div class="card" style="text-align:center;">
                <div style="color:var(--red); font-size:42px;">3</div>
                <div style="font-size:22px;">Críticos</div>
            </div>
            <div class="card" style="text-align:center;">
                <div style="color:var(--yellow); font-size:42px;">87%</div>
                <div style="font-size:22px;">5S Médio</div>
            </div>
        </div>

        <div class="card">
            <div style="font-size:26px; margin-bottom:12px;">Disponibilidade Física</div>
            <div style="display:flex; gap:16px;">
                <div style="flex:1;">
                    <div style="color:#888;">Beneficiamento</div>
                    <div style="font-size:52px; font-weight:700; color:var(--green);">98%</div>
                </div>
                <div style="flex:1;">
                    <div style="color:#888;">Concentração</div>
                    <div style="font-size:52px; font-weight:700; color:var(--yellow);">91%</div>
                </div>
            </div>
        </div>

        <!-- BOTÕES PRINCIPAIS -->
        <button class="btn" onclick="alert('Abrindo Avaliação 5S... (integração com seu App 2)')">
            📋 Nova Avaliação 5S
        </button>
        <button class="btn" style="background:#00b0ff; margin-top:8px;" onclick="alert('Upload de PDFs do SAP ativado')">
            📄 Upload IAMO (PDFs)
        </button>

    </div>

    <!-- NAVEGAÇÃO INFERIOR -->
    <div class="footer-nav">
        <div class="nav-item active">🏠 Início</div>
        <div class="nav-item">📊 KPIs</div>
        <div class="nav-item">👥 Equipe</div>
        <div class="nav-item">🛡️ 5S</div>
        <div class="nav-item">⚙️ Mais</div>
    </div>

    <script>
        // Relógio em tempo real
        function updateClock() {
            const now = new Date();
            let h = now.getHours().toString().padStart(2,'0');
            let m = now.getMinutes().toString().padStart(2,'0');
            let s = now.getSeconds().toString().padStart(2,'0');
            document.getElementById('clock').textContent = `\( {h}: \){m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>

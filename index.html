    <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão da Automação - Mina do Andrade v6.0</title>
    <link rel="manifest" href="data:application/manifest+json,{
        'name': 'Gestão da Automação',
        'short_name': 'GDA v60',
        'start_url': '.',
        'display': 'standalone',
        'background_color': '#0a0a0c',
        'theme_color': '#ff6a00',
        'icons': [{'src': 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA... (base64 icon 192x192)', 'sizes': '192x192', 'type': 'image/png'}]
    }">
    <style>
        :root {
            --bg: #0a0a0c; --brd: #2a2a35; --or: #ff6a00; --or2: #ff9500;
            --gn: #00e676; --yw: #ffd600; --rd: #ff1744; --bl: #00b0ff;
            --wh: #e8e8f0; --mt: #666680; --cb: #13131a; --cbr: #252530;
            --f: 'Barlow Condensed', sans-serif; --fm: 'Share Tech Mono', monospace; --fh: 'Rajdhani', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; height: -webkit-fill-available; }
        body { width: 100%; min-height: 100%; min-height: -webkit-fill-available; overflow-x: hidden;
               background: var(--bg); color: var(--wh); display: flex; flex-direction: column;
               font-family: var(--f); font-size: 28px; user-select: none; touch-action: manipulation;
               -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
        
        /* HEADER - Modern web-like with gradient */
        header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
                 background: linear-gradient(135deg, #0d0d10 0%, #1a1a22 100%); border-bottom: 3px solid var(--or);
                 position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(255,106,0,0.3); }
        .logo { font-family: var(--fh); font-size: 44px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; 
                background: linear-gradient(45deg, var(--or), var(--or2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 32px; color: var(--mt); letter-spacing: 2px; font-family: var(--fm); text-transform: uppercase; }
        .clock { margin-left: auto; text-align: right; flex-shrink: 0; }
        .ck { font-family: var(--fm); font-size: 36px; color: var(--or2); letter-spacing: 2px; line-height: 1; }
        .cd { font-size: 26px; color: var(--mt); letter-spacing: 1.5px; }
        
        /* MISSÃO VISÃO - Card-like sections */
        .mv { background: rgba(7,7,7,0.8); border-bottom: 1px solid var(--brd); padding: 8px 0; }
        .mvrow { display: flex; align-items: flex-start; min-height: 28px; padding: 4px 0; }
        .mvlbl { font-family: var(--fm); font-size: 34px; letter-spacing: 1.8px; padding: 4px 12px; flex-shrink: 0;
                  border-right: 1px solid #1e1e28; white-space: nowrap; min-width: 65px; line-height: 1.4; text-transform: uppercase; }
        .mvlbl.mis { color: var(--or); } .mvlbl.vis { color: var(--bl); }
        .mvtxt { flex: 1; padding: 4px 14px; font-family: var(--fm); font-size: 34px; color: #aaaacc; line-height: 1.4;
                 white-space: normal; word-break: break-word; text-transform: uppercase; }
        
        /* ALERT TICKER - Smooth web animation */
        .alertbar { background: linear-gradient(90deg, #0c0c10, #181820, #0c0c10); border-bottom: 2px solid #1a1a22; overflow: hidden; }
        .ticker-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; }
        .ab { font-family: var(--fh); font-size: 28px; font-weight: 700; padding: 3px 10px; border-radius: 4px; flex-shrink: 0; letter-spacing: 1.2px; }
        .ab.cr { border: 2px solid var(--rd); color: var(--rd); background: rgba(255,23,68,0.1); }
        .ab.at { border: 2px solid var(--yw); color: var(--yw); background: rgba(255,214,0,0.1); }
        .ticker-wrap { flex: 1; overflow: hidden; mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); }
        .ticker-text { display: flex; white-space: nowrap; animation: tickerSlide 35s linear infinite; }
        .ticker-text.si { animation-duration: 40s; }
        .ti { display: inline-flex; align-items: center; gap: 6px; padding: 0 20px; font-family: var(--fm); font-size: 28px; }
        .td { width: 8px; height: 8px; border-radius: 50%; background: var(--or); }
        .tg { font-size: 26px; padding: 2px 6px; border-radius: 4px; font-family: var(--fh); font-weight: 700; }
        .tsig { background: rgba(42,10,10,0.8); color: var(--rd); }
        .tepi { background: rgba(42,42,10,0.8); color: var(--yw); }
        .tcal { background: rgba(10,42,10,0.8); color: var(--gn); }
        .ttrn { background: rgba(10,26,42,0.8); color: var(--bl); }
        .trsk { background: rgba(26,15,0,0.8); color: var(--or); }
        .t5s { background: rgba(26,10,42,0.8); color: #aa66ff; }
        @keyframes tickerSlide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        /* NAV - Modern tab bar with smooth transitions */
        nav { display: flex; overflow-x: auto; background: linear-gradient(180deg, #0d0d10, #1a1a22); 
              border-bottom: 3px solid var(--brd); scrollbar-width: none; position: sticky; top: 140px; z-index: 90; }
        nav::-webkit-scrollbar { display: none; }
        .nav-tab { flex-shrink: 0; font-family: var(--fh); font-size: 30px; font-weight: 700; padding: 12px 18px;
                   color: var(--mt); border-bottom: 4px solid transparent; cursor: pointer; white-space: nowrap;
                   letter-spacing: 1.5px; transition: all 0.3s ease; position: relative; }
        .nav-tab:hover { color: var(--or2); background: rgba(255,106,0,0.1); }
        .nav-tab.active { color: var(--or); border-bottom-color: var(--or); background: rgba(255,106,0,0.15); }
        .progress-bar { height: 4px; background: var(--brd); position: sticky; top: 144px; z-index: 89; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--or), var(--or2)); transition: width 0.1s linear; }
        
        /* PAGES - Smooth fade transitions */
        .page { display: none; padding: 16px; flex-direction: column; gap: 12px; touch-action: pan-y pan-x;
                -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
        .page.active { display: flex; animation: fadeIn 0.4s ease; height: calc(100vh - 220px); overflow-y: auto; overflow-x: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* CARDS - Glassmorphism modern look */
        .card { background: rgba(19,19,26,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(42,42,53,0.5);
                border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .card-header { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--brd);
                       background: rgba(15,15,22,0.8); }
        .card-title { font-family: var(--fh); font-size: 32px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
                      color: var(--or); display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 4px; height: 16px; background: var(--or); border-radius: 2px; }
        .card-body { padding: 16px; }
        
        /* KPI Grid - Responsive modern grid */
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .kpi-card { background: rgba(15,15,24,0.9); border: 1px solid rgba(30,30,42,0.8); border-radius: 12px; padding: 16px; }
        .kpi-label { font-family: var(--fm); font-size: 26px; color: var(--mt); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; line-height: 1.2; }
        .kpi-value { font-family: var(--fh); font-weight: 700; font-size: 52px; line-height: 1; }
        .kpi-status { height: 4px; border-radius: 2px; margin: 8px 0; background: var(--brd); }
        .kpi-meta { font-size: 28px; color: var(--mt); line-height: 1.5; }
        .kpi-meta span { color: #bbb; }
        
        /* Team Band - Carousel-like */
        .team-band { background: rgba(10,10,12,0.95); border-top: 1px solid var(--brd); padding: 8px 0; overflow: hidden; }
        .team-carousel { display: flex; animation: teamSlide 12s linear infinite; }
        .team-pair { display: flex; gap: 20px; min-width: 100%; padding: 8px 16px; }
        .team-card { flex: 1; background: rgba(19,19,26,0.6); border-radius: 8px; padding: 12px; border: 1px solid rgba(255,106,0,0.2); }
        .team-name { font-family: var(--fh); font-size: 32px; color: var(--or); }
        .team-role { font-family: var(--fm); font-size: 24px; color: var(--mt); }
        @keyframes teamSlide { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        /* FOOTER - Modern bottom nav */
        footer { display: flex; gap: 8px; padding: 12px; background: linear-gradient(180deg, #0d0d10, #000); 
                 border-top: 3px solid var(--brd); position: sticky; bottom: 0; z-index: 100; }
        .footer-btn { flex: 1; font-family: var(--fh); font-size: 28px; font-weight: 700; padding: 16px; border-radius: 12px;
                      cursor: pointer; letter-spacing: 1.5px; transition: all 0.3s ease; border: 2px solid transparent; }
        .footer-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,106,0,0.4); }
        .edit-btn { background: linear-gradient(45deg, var(--or), var(--or2)); color: #000; }
        .data-btn { background: linear-gradient(45deg, var(--bl), #4fc3f7); color: #000; }
        .settings-btn { background: linear-gradient(45deg, var(--gn), #69f0ae); color: #000; }
        .auto-btn { background: linear-gradient(45deg, var(--yw), #ffeb3b); color: #000; }
        
        /* MODALS - Fullscreen web overlays */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,12,0.98);
                 z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; animation: modalSlide 0.4s ease; }
        @keyframes modalSlide { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-content { width: 95%; max-width: 800px; max-height: 90%; background: var(--cb); border-radius: 20px;
                         border: 2px solid var(--or); overflow-y: auto; }
        
        /* Responsive */
        @media (max-width: 480px) { body { font-size: 26px; } .logo { font-size: 38px; } }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo">GDA</div>
        <div class="subtitle">Mina do Andrade - v6.0</div>
        <div class="clock">
            <div class="ck" id="clock">--:--:--</div>
            <div class="cd" id="date">----- -- --</div>
        </div>
    </header>

    <!-- MISSÃO VISÃO -->
    <div class="mv">
        <div class="mvrow">
            <div class="mvlbl mis">MISSÃO</div>
            <div class="mvtxt" id="missaoTxt">Carregando...</div>
        </div>
        <div class="mvrow">
            <div class="mvlbl vis">VISÃO</div>
            <div class="mvtxt" id="visaoTxt">Carregando...</div>
        </div>
    </div>

    <!-- ALERT TICKER -->
    <div class="alertbar">
        <div class="ticker-row">
            <div class="ab cr" id="critCount">CRÍTICO: 0</div>
            <div class="ab at" id="attCount">ATENÇÃO: 0</div>
            <div class="ticker-wrap">
                <div class="ticker-text" id="tickerCrit"></div>
            </div>
        </div>
        <div class="ticker-row">
            <div class="ticker-wrap">
                <div class="ticker-text si" id="tickerAtt"></div>
            </div>
        </div>
    </div>

    <!-- NAV TABS -->
    <nav id="navTabs">
        <div class="nav-tab active" data-tab="0">KPIs</div>
        <div class="nav-tab" data-tab="1">Segurança</div>
        <div class="nav-tab" data-tab="2">EPI</div>
        <!-- Add more tabs as per doc: 13 total -->
        <div class="nav-tab" data-tab="3">Ordens</div><div class="nav-tab" data-tab="4">Forces</div>
        <div class="nav-tab" data-tab="5">Risco</div><div class="nav-tab" data-tab="6">Trein.</div>
        <div class="nav-tab" data-tab="7">Agenda</div><div class="nav-tab" data-tab="8">Equipe</div>
        <div class="nav-tab" data-tab="9">5S</div><div class="nav-tab" data-tab="10">IAMO</div>
        <div class="nav-tab" data-tab="11">Validades</div><div class="nav-tab" data-tab="12">Corretivas</div>
    </nav>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <!-- PAGES -->
    <div id="pages">
        <div class="page active" data-page="0">
            <div class="card"><div class="card-header"><div class="card-title">KPIs Operacionais</div></div>
                <div class="card-body">
                    <div class="kpi-grid" id="kpiGrid">
                        <!-- Dynamic KPIs from D.kpis -->
                    </div>
                </div></div>
        </div>
        <!-- Other pages similar structure -->
        <div class="page" data-page="1"><!-- Segurança content --></div>
        <!-- ... -->
    </div>

    <!-- TEAM BAND -->
    <div class="team-band">
        <div class="team-carousel" id="teamCarousel">
            <!-- Dynamic team pairs -->
        </div>
    </div>

    <!-- FOOTER -->
    <footer id="footer">
        <button class="footer-btn edit-btn" id="editBtn" style="display:none;">EDITAR</button>
        <button class="footer-btn data-btn" id="dataBtn">DADOS</button>
        <button class="footer-btn settings-btn" id="settingsBtn">AJUSTES</button>
        <button class="footer-btn auto-btn" id="autoBtn">AUTO</button>
    </footer>

    <!-- MODAL EXAMPLE for EDITAR -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div style="padding:20px; border-bottom:1px solid var(--brd);">
                <h2 style="font-family:var(--fh); color:var(--or);">Editar Dados</h2>
            </div>
            <!-- Tabs for editing KPIs, Alertas, etc. as per doc 17 tabs -->
            <div id="editTabs"><!-- Dynamic --></div>
        </div>
    </div>

    <script>
        // Data from file [file:1]
        const D = {
            missao: "GARANTIR A CONFIABILIDADE E DISPONIBILIDADE DOS SISTEMAS DE AUTOMAO, INSTRUMENTAO E REDES, SUPORTANDO A OPERAO COM SEGURANA, EFICINCIA E CONFORMIDADE.",
            visao: "SER REFERNCIA EM EXCELNCIA TCNICA E GESTO DE AUTOMAO NA ARCELORMITTAL, PROMOVENDO INOVAO E DESENVOLVIMENTO CONTNUO DA EQUIPE.",
            // ... full D object from file snippets
            kpis: { aderencia: {val:99.6, meta:100}, /* etc */ },
            equipe: [ /* team data */ ],
            // Full data loaded from localStorage or Firebase as per original
        };

        // Init
        let currentTab = 0, autoOn = true, tabTimer, teamTimer, tickerTimer;
        const tabs = document.querySelectorAll('.nav-tab');
        const pages = document.querySelectorAll('.page');

        // Clock
        function tick() {
            const n = new Date(), dw = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'][n.getDay()],
                  mo = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'][n.getMonth()];
            document.getElementById('clock').textContent = [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>x.toString().padStart(2,0)).join(':');
            document.getElementById('date').textContent = `${dw} ${n.getDate().toString().padStart(2,0)} ${mo}`;
            setTimeout(tick, 1000);
        } tick();

        // Render functions (simplified)
        function renderMissao() {
            document.getElementById('missaoTxt').textContent = D.missao;
            document.getElementById('visaoTxt').textContent = D.visao;
        }

        function renderKPI() {
            // Dynamic grid from D.kpis, D.dispFisica etc [file:1]
            const grid = document.getElementById('kpiGrid');
            grid.innerHTML = '<div class="kpi-card">...</div>'; // Build from data
        }

        function switchTab(i) {
            tabs[currentTab].classList.remove('active');
            pages[currentTab].classList.remove('active');
            currentTab = i;
            tabs[i].classList.add('active');
            pages[i].classList.add('active');
            // Render specific page
            if (i === 0) renderKPI();
            resetProgress();
        }

        // Nav events
        tabs.forEach((tab, i) => tab.onclick = () => switchTab(i));

        // Auto rotation
        document.getElementById('autoBtn').onclick = () => {
            autoOn = !autoOn;
            if (autoOn) startAuto(); else stopAuto();
        };

        function startAuto() { tabTimer = setInterval(() => switchTab((currentTab + 1) % tabs.length), 15000); }
        function stopAuto() { clearInterval(tabTimer); }

        function resetProgress() {
            const bar = document.getElementById('progressFill');
            bar.style.width = '0%';
            bar.style.transition = 'width 15s linear';
            setTimeout(() => bar.style.width = '100%', 50);
        }

        // Modals
        document.getElementById('editBtn').onclick = () => {
            document.getElementById('editModal').classList.add('active');
            // Load 17 edit tabs from doc [file:1]
        };

        // Init render
        renderMissao();
        renderKPI();
        startAuto();

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64...' /* SW code for offline */);
        }
    </script>
</body>
</html>
